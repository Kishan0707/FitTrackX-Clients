<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a18"/>
      <stop offset="50%" stop-color="#ff3d5a"/>
      <stop offset="100%" stop-color="#ff4ecb"/>
    </linearGradient>
  </defs>

  <!-- Rounded Background -->
  <rect x="10" y="10" width="100" height="100" rx="28" fill="url(#grad)" />

  <!-- Dumbbell -->
  <g stroke="white" stroke-width="6" stroke-linecap="round">
    <!-- center bar -->
    <line x1="45" y1="60" x2="75" y2="60" />

    <!-- left -->
    <line x1="38" y1="50" x2="38" y2="70" />
    <line x1="30" y1="55" x2="30" y2="65" />

    <!-- right -->
    <line x1="82" y1="50" x2="82" y2="70" />
    <line x1="90" y1="55" x2="90" y2="65" />
  </g>

</svg>